<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Digital</title>
    <style>
        body { background-color: #f5f2eb; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border: 2px solid #d4af37; text-align: center; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; }
        h1 { font-family: serif; color: #111; }
        .btn-validar { 
            display: inline-block; 
            background-color: #111; 
            color: #d4af37; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            margin-top: 20px;
            border: 2px solid #d4af37;
            transition: 0.3s;
        }
        .btn-validar:hover { background-color: #d4af37; color: #111; }
        .vista-validador { display: none; }
    </style>
</head>
<body>

    <div id="vista-invitacion" class="card">
        <h1>60 Años</h1>
        <p id="txt-familia">Cargando...</p>
        <p>Pases: <span id="txt-pases">-</span></p>
        <hr>
        <p>Pulsa el botón para validar tu acceso:</p>
        <a href="#" id="btn-qr" class="btn-validar">VALIDAR PASE</a>
    </div>

    <div id="vista-validador" class="card vista-validador">
        <h2 id="status-title">VERIFICANDO...</h2>
        <div id="status-desc">-</div>
        <br>
        <button onclick="location.href='index.html'" class="btn-validar">VOLVER</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const familia = urlParams.get('familia') || 'Invitado';
        const pases = urlParams.get('pases') || '1';
        const modo = urlParams.get('modo');

        if (modo === 'validar') {
            // MOSTRAR VISTA VALIDADOR
            document.getElementById('vista-invitacion').style.display = 'none';
            document.getElementById('vista-validador').style.display = 'block';
            
            document.getElementById('status-title').innerText = "ACCESO CONFIRMADO";
            document.getElementById('status-title').style.color = "#2ecc71";
            document.getElementById('status-desc').innerText = `Familia: ${familia}\nPases: ${pases}`;
        } else {
            // MOSTRAR VISTA INVITACIÓN
            document.getElementById('txt-familia').innerText = familia;
            document.getElementById('txt-pases').innerText = pases;
            // El link del botón apunta a esta misma página pero en modo validar
            document.getElementById('btn-qr').href = `index.html?modo=validar&familia=${encodeURIComponent(familia)}&pases=${pases}`;
        }
    </script>
</body>
</html>
