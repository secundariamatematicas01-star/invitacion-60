<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación - 60 Años</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #fcf9f2;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .invitacion-card {
            background-color: #fdfbf7;
            border: 2px solid #d4af37;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            position: relative;
            border-radius: 8px;
            /* Animación de entrada de toda la tarjeta */
            animation: aparecer 1.5s ease-out;
        }

        /* --- EL MOÑO --- */
        .mono-decorativo {
            position: absolute;
            top: -30px;
            right: -30px;
            width: 120px; /* Ajusta este tamaño si lo ves muy grande o pequeño */
            z-index: 10;
            /* Animación de flotar muy suave */
            animation: flotar 4s ease-in-out infinite;
        }

        .header-invitacion {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            color: #111;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        /* Estrellas animadas */
        .estrella {
            display: inline-block;
            color: #d4af37;
            animation: brillar 3s infinite alternate;
        }

        .Gran-Numero {
            font-family: 'Cinzel', serif;
            font-size: 6rem;
            font-weight: 400;
            line-height: 1;
            margin: 10px 0 0 0;
            color: #111;
            /* Animación del 60 palpitando lentamente */
            animation: latido 3s ease-in-out infinite;
        }

        .Anos {
            font-family: 'Alex Brush', cursive;
            font-size: 3.5rem;
            margin-top: -20px;
            color: #111;
        }

        .Subtitulo {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #666;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 10px;
            display: inline-block;
            width: 80%;
        }

        .Nombres {
            font-family: 'Alex Brush', cursive;
            font-size: 2.5rem;
            margin: 25px 0;
            color: #111;
        }

        .datos-dinamicos {
            margin: 30px 0;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: #333;
        }

        .campo-dinamico {
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
            color: #111;
            border-bottom: 1px dashed #d4af37;
            display: inline-block;
            min-width: 150px;
            padding: 2px 10px;
        }

        .Fecha {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 2px;
            margin-top: 30px;
        }

        .Fecha span {
            color: #d4af37;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .corazon {
            display: inline-block;
            color: #d4af37;
            animation: latido 2s infinite;
        }

        .btn-confirmar {
            margin-top: 35px;
            background-color: #111;
            color: #fff;
            border: 1px solid #d4af37;
            padding: 15px 30px;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-confirmar:hover {
            background-color: #d4af37;
            color: #111;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        /* --- ANIMACIONES ELEGANTES (KEYFRAMES) --- */
        
        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); } /* Crece un 4% muy sutilmente */
            100% { transform: scale(1); }
        }

        @keyframes brillar {
            0% { opacity: 0.4; text-shadow: 0 0 0px #d4af37; }
            100% { opacity: 1; text-shadow: 0 0 10px #d4af37; }
        }

        @keyframes flotar {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="invitacion-card">
        <img src="mono.png" class="mono-decorativo" alt="Moño Elegante">

        <div class="header-invitacion"><span class="estrella">★</span> INVITACIÓN <span class="estrella">★</span></div>
        
        <div class="Gran-Numero">60</div>
        
        <div class="Anos">años</div>
        <div class="Subtitulo">DE UNA VIDA EXTRAORDINARIA</div>
        
        <div class="Nombres">Juana María Dueñas y José Delgado</div>
        
        <div class="datos-dinamicos">
            <p>FAMILIA: <span id="txt-familia" class="campo-dinamico">Cargando...</span></p>
            <p>CANTIDAD DE PERSONAS: <span id="txt-pases" class="campo-dinamico">-</span></p>
        </div>

        <div class="Fecha">SÁBADO <span>18</span> JULIO 2026</div>
        <p style="font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 3px;">
            <span class="corazon">♥</span> PASE PERSONAL <span class="corazon">♥</span>
        </p>

        <button class="btn-confirmar" onclick="confirmarAsistencia()">Confirmar Asistencia vía WhatsApp</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const apellidoFamilia = urlParams.get('familia') || 'Invitado Especial';
        const numeroPases = urlParams.get('pases') || '2';

        document.getElementById('txt-familia').innerText = apellidoFamilia;
        document.getElementById('txt-pases').innerText = numeroPases;

        function confirmarAsistencia() {
            // ¡NO OLVIDES CAMBIAR ESTE NÚMERO POR EL TUYO!
            const telefono = "528442958983"; 
            const mensaje = `¡Hola! La Familia ${apellidoFamilia} confirma su asistencia para ${numeroPases} personas al 60 aniversario.`;
            const urlWhatsapp = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
            window.open(urlWhatsapp, '_blank');
        }
    </script>
</body>
</html>
