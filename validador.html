<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador - secundariamatematicas01-star</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #111; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: white; }
        .validador-box { background-color: #1a1a1a; border: 2px solid #d4af37; border-radius: 12px; padding: 40px 30px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-badge { font-size: 4rem; margin-bottom: 10px; }
        .status-title { font-family: 'Cinzel', serif; font-size: 1.6rem; letter-spacing: 2px; margin-bottom: 25px; font-weight: bold; }
        .confirmado { color: #2ecc71; }
        .no-confirmado { color: #e74c3c; }
        .info-card { background-color: #222; border-radius: 8px; padding: 20px; margin-top: 20px; border-left: 4px solid #d4af37; text-align: left; }
        .info-label { font-size: 0.75rem; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
        .info-value { font-size: 1.2rem; font-weight: bold; color: #fdfbf7; margin-bottom: 15px; }
        .info-value:last-child { margin-bottom: 0; }
        .btn-regresar { margin-top: 30px; background: transparent; border: 1px solid #555; color: #aaa; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .footer-brand { font-size: 0.65rem; color: #444; margin-top: 20px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="validador-box">
        <div id="status-icon" class="status-badge">✓</div>
        <div id="status-text" class="status-title">ACCESO CONFIRMADO</div>

        <div class="info-card">
            <div class="info-label">Invitado / Familia</div>
            <div id="val-familia" class="info-value">-</div>

            <div class="info-label">Pases Autorizados</div>
            <div id="val-pases" class="info-value">- personas</div>
        </div>

        <button class="btn-regresar" onclick="window.history.back()">Cerrar Registro</button>
        <div class="footer-brand">ID de Evento: secundariamatematicas01-star</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const usuarioValido = "secundariamatematicas01-star";
        
        // Obtener datos del QR
        const userParam = urlParams.get('user');
        const familia = urlParams.get('familia');
        const pases = urlParams.get('pases');

        const iconEl = document.getElementById('status-icon');
        const textEl = document.getElementById('status-text');
        const familiaEl = document.getElementById('val-familia');
        const pasesEl = document.getElementById('val-pases');

        // SEGURIDAD: Validamos que pertenezca a tu usuario y que tenga datos reales
        if (userParam === usuarioValido && familia && pases) {
            iconEl.innerText = "✓";
            iconEl.className = "status-badge confirmado";
            textEl.innerText = "ACCESO CONFIRMADO";
            textEl.className = "status-title confirmado";
            
            familiaEl.innerText = familia;
            
            // CORRECCIÓN AQUÍ: Usamos parseInt para asegurar una comparación numérica limpia
            const cantidadPases = parseInt(pases, 10) || 0;
            pasesEl.innerText = `${cantidadPases} ${cantidadPases === 1 ? 'Persona' : 'Personas'}`;
        } else {
            // Si intentan usar un QR falso o de otro evento
            iconEl.innerText = "✕";
            iconEl.className = "status-badge no-confirmado";
            textEl.innerText = "ACCESO DENEGADO";
            textEl.className = "status-title no-confirmado";
            
            familiaEl.innerText = "Código Inválido o Falsificado";
            pasesEl.innerText = "0 Personas";
        }
    </script>
</body>
</html>
